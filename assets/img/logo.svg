  <line x1="27" y1="39" x2="121" y2="39" stroke="#1C1200" stroke-width="2.5" clip-path="url(#cc)"/>
  <line x1="27" y1="51" x2="121" y2="51" stroke="#1C1200" stroke-width="2.5" clip-path="url(#cc)"/>
