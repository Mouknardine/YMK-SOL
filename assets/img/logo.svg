<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 152 104" fill="none" role="img" aria-label="YMK SOL">
  <defs>
    <linearGradient id="ymkY" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD23F"/>
      <stop offset="1" stop-color="#F5B301"/>
    </linearGradient>
    <linearGradient id="ymkO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F79A1E"/>
      <stop offset="1" stop-color="#EC7A08"/>
    </linearGradient>
  </defs>

  <!-- woven mat body : basketweave 3×2 -->
  <g stroke="#1A1A1A" stroke-width="5" stroke-linejoin="round">
    <!-- row 1 -->
    <rect x="34" y="22" width="36" height="31" fill="url(#ymkO)"/>
    <rect x="70" y="22" width="35" height="31" fill="url(#ymkY)"/>
    <rect x="105" y="22" width="35" height="31" fill="url(#ymkO)"/>
    <!-- row 2 -->
    <rect x="34" y="53" width="36" height="31" fill="url(#ymkY)"/>
    <rect x="70" y="53" width="35" height="31" fill="url(#ymkO)"/>
    <rect x="105" y="53" width="35" height="31" fill="url(#ymkY)"/>
  </g>

  <!-- plank seams -->
  <g stroke="#1A1A1A" stroke-width="3" stroke-linecap="round">
    <!-- R1C1 orange : horizontal -->
    <line x1="34" y1="32.5" x2="70" y2="32.5"/><line x1="34" y1="42.8" x2="70" y2="42.8"/>
    <!-- R1C2 yellow : vertical -->
    <line x1="81.6" y1="22" x2="81.6" y2="53"/><line x1="93.3" y1="22" x2="93.3" y2="53"/>
    <!-- R1C3 orange : horizontal -->
    <line x1="105" y1="32.5" x2="140" y2="32.5"/><line x1="105" y1="42.8" x2="140" y2="42.8"/>
    <!-- R2C1 yellow : vertical -->
    <line x1="46" y1="53" x2="46" y2="84"/><line x1="58" y1="53" x2="58" y2="84"/>
    <!-- R2C2 orange : horizontal -->
    <line x1="70" y1="63.5" x2="105" y2="63.5"/><line x1="70" y1="73.8" x2="105" y2="73.8"/>
    <!-- R2C3 yellow : vertical -->
    <line x1="116.6" y1="53" x2="116.6" y2="84"/><line x1="128.3" y1="53" x2="128.3" y2="84"/>
  </g>

  <!-- rolled left edge -->
  <rect x="12" y="16" width="30" height="74" rx="15" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="5"/>
  <!-- inner curl seam -->
  <path d="M31 20 C24 32 24 74 31 86" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- orange underside of the roll -->
  <path d="M16 74 C16 84 24 90 31 86 C24 74 24 32 31 20 C20 26 16 50 16 74 Z" fill="url(#ymkO)" stroke="#1A1A1A" stroke-width="5" stroke-linejoin="round"/>
</svg>
