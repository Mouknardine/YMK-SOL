  <circle cx="26" cy="90" r="13" fill="#F2BC4A"/>
  <rect x="13" y="87" width="26" height="6" fill="#EC7A08" clip-path="url(#rc)"/>
  <rect x="13" y="81" width="6" height="18" fill="#EC7A08" clip-path="url(#rc)"/>
  <rect x="33" y="81" width="6" height="18" fill="#EC7A08" clip-path="url(#rc)"/>
  <line x1="13" y1="87" x2="39" y2="87" stroke="#1C1200" stroke-width="1.5" clip-path="url(#rc)"/>
  <line x1="13" y1="93" x2="39" y2="93" stroke="#1C1200" stroke-width="1.5" clip-path="url(#rc)"/>
  <line x1="19" y1="77" x2="19" y2="103" stroke="#1C1200" stroke-width="1.5" clip-path="url(#rc)"/>
  <line x1="26" y1="77" x2="26" y2="103" stroke="#1C1200" stroke-width="1.5" clip-path="url(#rc)"/>
  <line x1="33" y1="77" x2="33" y2="103" stroke="#1C1200" stroke-width="1.5" clip-path="url(#rc)"/>
  <!-- Roll core white highlight inside circle -->
  <path d="M19 82 Q26 77 33 82 Q26 79 19 82 Z" fill="#EDE8E0"/>
