  <line x1="66" y1="3" x2="66" y2="98" stroke="#1C1200" stroke-width="2.5" clip-path="url(#cc)"/>
  <line x1="79" y1="3" x2="79" y2="98" stroke="#1C1200" stroke-width="2.5" clip-path="url(#cc)"/>
  <line x1="91" y1="3" x2="91" y2="98" stroke="#1C1200" stroke-width="2.5" clip-path="url(#cc)"/>
  <line x1="104" y1="3" x2="104" y2="98" stroke="#1C1200" stroke-width="2.5" clip-path="url(#cc)"/>
  <line x1="116" y1="3" x2="116" y2="98" stroke="#1C1200" stroke-width="2.5" clip-path="url(#cc)"/>

  <!-- Carpet outer stroke -->
  <path d="M29 12 L121 4 L121 94 L25 98 Z" stroke="#1C1200" stroke-width="5" stroke-linejoin="round"/>

  <!-- Roll cylinder arc (left side) -->
  <path d="M29 12 Q7 34 7 53 Q7 72 25 96" stroke="#1C1200" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Roll body fill (light grey) -->
  <path d="M29 12 Q14 33 13 53 Q13 72 25 96 Q16 73 16 53 Q16 34 29 12 Z" fill="#EDE8E0"/>
  <!-- Roll shine -->
  <path d="M24 18 Q14 37 14 53 Q14 69 22 87" stroke="rgba(255,255,255,0.7)" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Roll top rounded cap -->
