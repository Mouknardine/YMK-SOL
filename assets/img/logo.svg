  </defs>

  <!-- Carpet body: black base -->
  <path d="M29 12 L121 4 L121 94 L25 98 Z" fill="#1C1200"/>

  <!-- Yellow surface -->
  <rect x="28" y="3" width="95" height="96" fill="#F2BC4A" clip-path="url(#cc)"/>

  <!-- Orange horizontal stripes -->
  <rect x="28" y="14" width="95" height="12" fill="#EC7A08" clip-path="url(#cc)"/>
  <rect x="28" y="39" width="95" height="12" fill="#EC7A08" clip-path="url(#cc)"/>
  <rect x="28" y="64" width="95" height="12" fill="#EC7A08" clip-path="url(#cc)"/>

  <!-- Orange vertical stripes -->
  <rect x="54" y="3" width="12" height="96" fill="#EC7A08" clip-path="url(#cc)"/>
  <rect x="79" y="3" width="12" height="96" fill="#EC7A08" clip-path="url(#cc)"/>
  <rect x="104" y="3" width="12" height="96" fill="#EC7A08" clip-path="url(#cc)"/>

  <!-- Grid lines horizontal -->
